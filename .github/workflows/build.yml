name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.21.11"
            project: mc1_21_11
            project_dir: versions/1.21.11
            java: "21"
          - minecraft: "26.1"
            project: mc26_1
            project_dir: versions/26.1
            java: "25"
          - minecraft: "26.1.1"
            project: mc26_1_1
            project_dir: versions/26.1.1
            java: "25"
          - minecraft: "26.1.2"
            project: mc26_1_2
            project_dir: versions/26.1.2
            java: "25"
          - minecraft: "26.2"
            project: mc26_2
            project_dir: versions/26.2
            java: "25"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :${{ matrix.project }}:build
      - uses: actions/upload-artifact@v7
        with:
          name: binary-mc${{ matrix.minecraft }}
          if-no-files-found: error
          path: |
            ${{ matrix.project_dir }}/build/libs/carpet-spear-fix-*.jar
            !${{ matrix.project_dir }}/build/libs/*-sources.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true
      - name: Validate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          test "$GITHUB_REF_NAME" = "v$version"

          expected_count=0
          while IFS='|' read -r minecraft loader java carpet mixin; do
            artifact="dist/carpet-spear-fix-$version+mc$minecraft.jar"
            test -f "$artifact"
            test "$(unzip -p "$artifact" fabric.mod.json | jq -r '.depends.minecraft')" = "$minecraft"
            test "$(unzip -p "$artifact" fabric.mod.json | jq -r '.version')" = "$version+mc$minecraft"
            test "$(unzip -p "$artifact" fabric.mod.json | jq -r '.depends.fabricloader')" = "$loader"
            test "$(unzip -p "$artifact" fabric.mod.json | jq -r '.depends.java')" = "$java"
            test "$(unzip -p "$artifact" fabric.mod.json | jq -r '.depends.carpet')" = "$carpet"
            test "$(unzip -p "$artifact" carpet-spear-fix.mixins.json | jq -r '.compatibilityLevel')" = "$mixin"
            expected_count=$((expected_count + 1))
          done <<'TARGETS'
          1.21.11|>=0.18.2|>=21|>=1.4.194 <1.4.195|JAVA_21
          26.1|>=0.18.4|>=25|26.1|JAVA_17
          26.1.1|>=0.18.4|>=25|26.1|JAVA_17
          26.1.2|>=0.18.4|>=25|26.1|JAVA_17
          26.2|>=0.19.3|>=25|26.2|JAVA_25
          TARGETS

          test "$(find dist -maxdepth 1 -type f -name '*.jar' | wc -l)" -eq "$expected_count"

          (cd dist && sha256sum *.jar > SHA256SUMS)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            mkdir existing
            gh release download "$GITHUB_REF_NAME" \
              --pattern '*.jar' \
              --pattern 'SHA256SUMS' \
              --dir existing
            test "$(find existing -maxdepth 1 -type f | wc -l)" -eq "$(find dist -maxdepth 1 -type f | wc -l)"
            (cd existing && sha256sum --check SHA256SUMS)
            for file in dist/*.jar dist/SHA256SUMS; do
              cmp "$file" "existing/$(basename "$file")"
            done
          else
            gh release create "$GITHUB_REF_NAME" dist/*.jar dist/SHA256SUMS \
              --title "Carpet Spear Fix ${GITHUB_REF_NAME#v}" \
              --verify-tag \
              --notes 'Install exactly one JAR matching the server Minecraft version; do not install multiple artifacts.' \
              --generate-notes
          fi
